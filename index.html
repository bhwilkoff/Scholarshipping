<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="[App description — shown in search results and link previews]">
  <title>Scholarshipping — Find Your Path</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="site-header">
    <h1>Scholarshipping</h1>
    <p class="tagline">The only resource you'll need to find and apply to the most relevant scholarships.</p>
  </header>

  <main id="main-content">

    <section class="search-section">
      <div class="search-controls">
        <div class="search-bar">
          <label for="scholarship-search" class="visually-hidden">Search Scholarships</label>
          <input type="text" id="scholarship-search" placeholder="Search by name, provider, or keyword...">
        </div>
        
        <div class="filters">
          <div class="filter-group">
            <label for="filter-amount">Min Amount</label>
            <select id="filter-amount">
              <option value="0">Any</option>
              <option value="500">$500+</option>
              <option value="1000">$1,000+</option>
              <option value="2500">$2,500+</option>
              <option value="5000">$5,000+</option>
            </select>
          </div>
          
          <div class="filter-group">
            <label for="filter-location">Location</label>
            <select id="filter-location">
              <option value="all">All Locations</option>
              <option value="National">National</option>
              <option value="California">California</option>
              <option value="New York">New York</option>
              <option value="Texas">Texas</option>
              <option value="Florida">Florida</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="sort-by">Sort By</label>
            <select id="sort-by">
              <option value="deadline">Deadline (Soonest)</option>
              <option value="amount-high">Amount (Highest)</option>
              <option value="amount-low">Amount (Lowest)</option>
              <option value="likelihood">Likelihood (Highest)</option>
            </select>
          </div>
        </div>
      </div>
      
      <div class="results-info">
        <span id="result-count">0</span> scholarships found
      </div>
    </section>

    <section id="scholarship-list" class="scholarship-grid">
      <!-- Scholarships will be rendered here -->
    </section>

    <!-- Modal for Scholarship Details & Prompt Generator -->
    <div id="modal-backdrop" class="modal-backdrop hidden">
      <div id="details-modal" class="modal">
        <button id="close-modal" class="close-btn" aria-label="Close modal">&times;</button>
        <div id="modal-content" class="modal-body">
          <!-- Content will be injected here -->
        </div>
      </div>
    </div>

  </main>

  <footer class="site-footer">
    <p>Scholarshipping &mdash; built with care for future leaders</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
